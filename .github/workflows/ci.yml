name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  alloc:
    name: Alloc
    uses: ./.github/workflows/test.yml
    with:
      test: test_alloc

  ffi-context:
    name: FFI Context
    uses: ./.github/workflows/test.yml
    with:
      test: test_ffi_context

  gc-compat:
    name: GC Compatibility
    uses: ./.github/workflows/test.yml
    with:
      test: test_gc_compat

  serial:
    name: Serial
    uses: ./.github/workflows/test.yml
    with:
      test: test_serial

  ctx-validation:
    name: Context Validation
    uses: ./.github/workflows/test.yml
    with:
      test: test_ctx_validation
